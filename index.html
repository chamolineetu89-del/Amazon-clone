<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <h2 class="logo">amazon</h2>
  <input type="text" placeholder="Search Amazon">
  <div class="nav-links">
    <p>Hello</p>
    <p> Sign in</p>
    <p>Returns & Orders</p>
  </div>
</div>

<!-- Sub Navbar -->
<div class="subnav">
  <p>All</p>
  <p>Today's Deals</p>
  <p>Mobiles</p>
  <p>Fashion</p>
  <p>Electronics</p>
</div>

<!-- Hero Section -->
<div class="hero">
    <img src="https://images-eu.ssl-images-amazon.com/images/G/31/INSLGW/pc_unrec_may25_refresh._CB761742379_.jpg" alt="banner">
</div>

<!-- Products -->
<div class="products">

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/61cIHzCDl6L._AC_UY218_.jpg">
    <p>Headphones</p>
  </div>

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/51zN65yHCEL._AC_UL320_.jpg">
    <p>Shoes</p>
  </div>

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/816eXKgDfIL._AC_UL320_.jpg">
    <p>Watch</p>
  </div>

  <div class="card">
    <img src="https://m.media-amazon.com/images/I/71aYGrOy6gL._AC_UY218_.jpg">
    <p>Bag</p>
  </div>

</div>

<!-- Footer -->
<footer>
  <p>© 2026 Amazon Clone</p>
</footer>

<script src="script.js"></script>
</body>
</html>
